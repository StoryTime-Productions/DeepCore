name: DeepCore
version: ${version}
main: dev.deepcore.DeepCorePlugin
api-version: "1.21"
authors: [Nirav]
description: Speedrun challenge toggles for Paper servers.

commands:
  challenge:
    description: Manage speedrun challenge modes.
    usage: "/challenge <status|list|enable|disable|mode|component|end|stop|pause|resume|reset|resetworld|reload|logs>"
    permission: deepcore.challenge
    aliases: [ch]

permissions:
  deepcore.challenge:
    description: Allows managing challenge modes.
    default: op
  deepcore.challenge.reset:
    description: Allows resetting overworld, nether, and end via limbo.
    default: op
  deepcore.challenge.end:
    description: Allows ending a run and returning to prep mode.
    default: op
  deepcore.challenge.pause:
    description: Allows pausing and resuming an active challenge run.
    default: op
  deepcore.challenge.reload:
    description: Allows reloading DeepCore config from disk.
    default: op
  deepcore.challenge.logs.admin:
    description: Allows managing other players' DeepCore log preferences.
    default: op
