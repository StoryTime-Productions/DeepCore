name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pr-quality-gates:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests with coverage gate (>70%)
        run: bash ./gradlew --no-daemon clean check

      - name: Set up Python for diff coverage
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install diff-cover
        run: python -m pip install --upgrade diff-cover

      - name: Enforce changed-lines coverage >= 70%
        run: |
          diff-cover build/reports/jacoco/test/jacocoTestReport.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=70 \
            --src-roots=src/main/java

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ env.CODECOV_TOKEN }}
          slug: StoryTime-Productions/DeepCore
          fail_ci_if_error: true

  main-quality-suite:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run typecheck, lint, formatting, tests, and coverage gate
        run: bash ./gradlew --no-daemon clean quality

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ env.CODECOV_TOKEN }}
          slug: StoryTime-Productions/DeepCore
          fail_ci_if_error: true
